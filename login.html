<!DOCTYPE html>
<html>
<head>
    <title>Student Notes - Login</title>
    <style>
        body{
            font-family: Arial;
            background-color:#f2f2f2;
        }

        .container{
            width:300px;
            margin:100px auto;
            padding:20px;
            background:white;
            border-radius:5px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:8px;
            margin:8px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#4CAF50;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        .link{
            text-align:center;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Login</h2>

    <form>
        <input type="text" placeholder="Enter USN" required>
        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
</div>

</body>
</html>
